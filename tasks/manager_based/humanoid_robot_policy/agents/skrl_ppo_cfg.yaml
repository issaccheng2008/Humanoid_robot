seed: 42

# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: False

  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0

    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 128]
        activations: elu
    output: ACTIONS

  value:
    class: DeterministicMixin
    clip_actions: False

    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 128, 128]
        activations: elu
    output: ONE


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined from agent.rollouts


# PPO agent configuration
# Field names follow skrl's PPO_DEFAULT_CONFIG.
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO

  # G1-style rollout settings.
  # With num_envs=1024 in your env cfg, one PPO update collects:
  #   1024 envs * 24 rollout steps = 24576 transitions
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4

  # Discounting and GAE.
  discount_factor: 0.99
  lambda: 0.95

  # Optimizer.
  learning_rate: 1.0e-03
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01

  # G1 uses no skrl-side preprocessors.
  # Keep these as null first. If training becomes unstable, try RunningStandardScaler.
  state_preprocessor: null
  state_preprocessor_kwargs: null
  value_preprocessor: null
  value_preprocessor_kwargs: null

  # Start learning immediately.
  random_timesteps: 0
  learning_starts: 0

  # PPO stability.
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True

  # Exploration and value loss.
  # G1 flat uses 0.008; this is a good starting point for humanoid locomotion.
  entropy_loss_scale: 0.008
  value_loss_scale: 1.0

  # Additional stopping / shaping settings.
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  time_limit_bootstrap: False

  # Logging and checkpoints.
  experiment:
    directory: "humanoid_robot_policy_flat"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer

  # Same starting value as the G1 flat config.
  # Increase later if the robot starts learning but is not yet stable.
  timesteps: 100000

  environment_info: log